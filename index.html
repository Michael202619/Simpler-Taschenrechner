<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="displayArea">
        <output id="display"></output>
    </div>
    <div class="clearArea">
        <button id="allClear">AC</button>
        <button id="entryClear">CE</button>
    </div>
    <div class="operatorArea">
        <button id="plus" value="+">+</button>
        <button id="minus" value="-">-</button>
        <button id="multiply" value="*">·</button>
        <button id="divide" value="/">:</button>
        <button id="result" value="=">=</button>
    </div>
    <div class="numberArea">
        <button id="one" value="1">1</button>
        <button id="two" value="2">2</button>
        <button id="three" value="3">3</button>
        <button id="four" value="4">4</button>
        <button id="five" value="5">5</button>
        <button id="six" value="6">6</button>
        <button id="seven" value="7">7</button>
        <button id="eight" value="8">8</button>
        <button id="nine" value="9">9</button>
        <button id="negative" value="-">(-x)</button>
        <button id="zero" value="0">0</button>
        <button id="point" value=".">.</button>
    </div>
    <div class="extra_operatorArea">
        <button id="reciprocal" value="reciprocal">1/x</button>
        <button id="squared" value="squared">x²</button>
        <button id="sqrt" value="sqrt">sqrt(x)</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
